<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chaos Shooter Omega</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:white;
    font-family:Arial;
    touch-action:none;
}

#login{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:white;
}

input{
    margin:5px;
    padding:10px;
}

canvas{
    display:none;
}

#joystick{
    position:fixed;
    left:20px;
    bottom:20px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:rgba(0,0,0,0.2);
    display:none;
}

#stick{
    position:absolute;
    width:50px;
    height:50px;
    left:35px;
    top:35px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
}

#fireBtn{
    position:fixed;
    right:30px;
    bottom:40px;
    width:90px;
    height:90px;
    border-radius:50%;
    background:red;
    color:white;
    font-size:40px;
    display:none;
    justify-content:center;
    align-items:center;
    user-select:none;
}
</style>
</head>
<body>

<div id="login">
    <h2>CHAOS SHOOTER OMEGA</h2>

    <input id="user" placeholder="Username">
    <input id="pass" type="password" placeholder="Password">

    <button onclick="register()">Register</button>
    <button onclick="login()">Login</button>
</div>

<canvas id="game"></canvas>

<div id="joystick">
    <div id="stick"></div>
</div>

<div id="fireBtn">🔥</div>

<script src="/socket.io/socket.io.js"></script>
<script src="game.js"></script>

</body>
</html>
