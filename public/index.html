<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaos Shooter Omega — 3D Voxel Multiplayer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- HUD (hidden until playing) -->
  <div id="hud">
    <div id="crosshair"></div>
    <div id="topInfo">SCORE: <span id="score">0</span><br/>WAVE: <span id="wave">1</span><br/>PLAYERS: <span id="pcount">1</span></div>
    <div id="killfeed"></div>
    <div id="healthWrap"><div id="healthLabel">HEALTH</div><div id="healthBarBg"><div id="healthBar"></div></div></div>
    <div id="ammo"><span id="ammoText">30 / 30</span></div>
  </div>
  <div id="damageFlash"></div>
  <div id="deadOverlay">YOU DIED — RESPAWNING…</div>

  <!-- Start screen -->
  <div id="startScreen" class="screen">
    <h1>CHAOS SHOOTER OMEGA</h1>
    <p>3D voxel multiplayer — fight the zombie waves together, or shoot each other.<br/>
       <span class="key">WASD</span> move &nbsp;<span class="key">SPACE</span> jump &nbsp;<span class="key">MOUSE</span> look &nbsp;<span class="key">CLICK</span> shoot &nbsp;<span class="key">R</span> reload</p>
    <div>
      <input id="nameInput" placeholder="Your name" maxlength="16" value="Player" />
      <input id="colorInput" type="color" value="#1e90ff" />
    </div>
    <button id="playBtn" class="btn">Click to Play</button>
  </div>

  <!-- Libraries: Three.js from CDN, Socket.io served by our own server -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
