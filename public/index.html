<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chaos Shooter Omega — 3D Voxel Multiplayer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #hud { position: fixed; inset: 0; pointer-events: none; color: #fff; text-shadow: 2px 2px 0 #000; display: none; }
  #crosshair { position: fixed; left: 50%; top: 50%; width: 22px; height: 22px; transform: translate(-50%,-50%); }
  #crosshair::before, #crosshair::after { content:""; position:absolute; background:#fff; box-shadow:0 0 2px #000; }
  #crosshair::before { left:50%; top:0; width:2px; height:100%; transform:translateX(-50%); }
  #crosshair::after  { top:50%; left:0; height:2px; width:100%; transform:translateY(-50%); }
  #healthWrap { position: fixed; left: 20px; bottom: 20px; width: 260px; }
  #healthLabel { font-size: 13px; margin-bottom: 4px; letter-spacing: 2px; }
  #healthBarBg { width: 100%; height: 22px; background: #400; border: 3px solid #000; }
  #healthBar { height: 100%; width: 100%; background: linear-gradient(90deg,#3f0,#0a0); transition: width .12s; }
  #ammo { position: fixed; right: 24px; bottom: 24px; font-size: 28px; font-weight: bold; }
  #ammo .reload { color:#ff5; font-size:16px; display:block; text-align:right; }
  #topInfo { position: fixed; left: 20px; top: 16px; font-size: 18px; line-height: 1.5; }
  #killfeed { position: fixed; right: 20px; top: 16px; font-size: 14px; text-align: right; line-height: 1.6; }
  #damageFlash { position: fixed; inset: 0; background: rgba(255,0,0,0); pointer-events: none; transition: background .1s; }
  .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color:#fff; background: rgba(0,0,0,.85); z-index: 10; }
  .screen h1 { font-size: 54px; letter-spacing: 5px; margin-bottom: 8px; color:#8f8; text-shadow: 4px 4px 0 #000; }
  .screen p  { font-size: 16px; max-width: 560px; line-height: 1.7; margin-bottom: 20px; }
  .screen input { font-family: inherit; font-size: 18px; padding: 8px 12px; margin: 6px; border: 3px solid #000; }
  .btn { pointer-events:auto; cursor:pointer; font-family:inherit; font-size:22px; padding:14px 34px; background:#2a2; color:#fff; border:4px solid #000; letter-spacing:3px; text-transform:uppercase; box-shadow:4px 4px 0 #000; }
  .btn:hover { background:#3c3; }
  .key { display:inline-block; background:#333; border:2px solid #000; padding:0 8px; border-radius:4px; }
  #deadOverlay { position: fixed; inset: 0; display:none; align-items:center; justify-content:center; color:#f66; font-size:40px; text-shadow:3px 3px 0 #000; pointer-events:none; z-index: 5; }
</style>
</head>
<body>
  <div id="hud">
    <div id="crosshair"></div>
    <div id="topInfo">SCORE: <span id="score">0</span><br/>WAVE: <span id="wave">1</span><br/>PLAYERS: <span id="pcount">1</span></div>
    <div id="killfeed"></div>
    <div id="healthWrap"><div id="healthLabel">HEALTH</div><div id="healthBarBg"><div id="healthBar"></div></div></div>
    <div id="ammo"><span id="ammoText">30 / 30</span></div>
  </div>
  <div id="damageFlash"></div>
  <div id="deadOverlay">YOU DIED — RESPAWNING…</div>

  <div id="startScreen" class="screen">
    <h1>CHAOS SHOOTER OMEGA</h1>
    <p>3D voxel multiplayer — fight the zombie waves together, or shoot each other.<br/>
       <span class="key">WASD</span> move &nbsp;<span class="key">SPACE</span> jump &nbsp;<span class="key">MOUSE</span> look &nbsp;<span class="key">CLICK</span> shoot &nbsp;<span class="key">R</span> reload</p>
    <div>
      <input id="nameInput" placeholder="Your name" maxlength="16" value="Player" />
      <input id="colorInput" type="color" value="#1e90ff" />
    </div>
    <button id="playBtn" class="btn">Click to Play</button>
  </div>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
  /* =====================================================================
     CLIENT: renders the authoritative server state in 3D.
     - builds terrain from the server's seed (identical world for everyone)
     - sends local movement + shots as INTENT; server decides outcomes
     - renders other players as colored blocky avatars + shared enemies
     ===================================================================== */

  const socket = io();
  let myId = null, running = false;
  let SEED = 0, WORLD = 50, MAX_H = 8;
  const heightMap = [];

  // ---- Three.js core ----
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87ceeb);
  scene.fog = new THREE.Fog(0x87ceeb, 35, 90);
  const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 500);
  const renderer = new THREE.WebGLRenderer({ antialias: false });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
  document.body.appendChild(renderer.domElement);
  renderer.autoClear = false;
  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 0.9));
  const sun = new THREE.DirectionalLight(0xffffff, 0.7); sun.position.set(30,60,20); scene.add(sun);

  // gun overlay scene (bottom-right, never clips walls)
  const gunScene = new THREE.Scene();
  const gunCamera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.01, 10);
  gunScene.add(new THREE.HemisphereLight(0xffffff, 0x333333, 1.1));
  let gun; { gun = new THREE.Group();
    const body = new THREE.Mesh(new THREE.BoxGeometry(0.14,0.14,0.7), new THREE.MeshLambertMaterial({color:0x333,flatShading:true}));
    const barrel = new THREE.Mesh(new THREE.BoxGeometry(0.06,0.06,0.4), new THREE.MeshLambertMaterial({color:0x111,flatShading:true})); barrel.position.set(0,0.02,-0.5);
    const grip = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.22,0.12), new THREE.MeshLambertMaterial({color:0x552200,flatShading:true})); grip.position.set(0,-0.16,0.2);
    gun.add(body,barrel,grip); gun.position.set(0.28,-0.28,-0.7); gunScene.add(gun);
  }

  // ---- Terrain rebuild from server seed (same noise as server.js) ----
  function hash(x,z){let n=Math.sin((x+SEED)*127.1+(z+SEED)*311.7)*43758.5453;return n-Math.floor(n);}
  function smoothNoise(x,z){const xi=Math.floor(x),zi=Math.floor(z),xf=x-xi,zf=z-zi;
    const tl=hash(xi,zi),tr=hash(xi+1,zi),bl=hash(xi,zi+1),br=hash(xi+1,zi+1);
    const u=xf*xf*(3-2*xf),v=zf*zf*(3-2*zf);const t=tl+(tr-tl)*u,b=bl+(br-bl)*u;return t+(b-t)*v;}
  function terrainHeight(x,z){let h=smoothNoise(x*0.12,z*0.12)*0.6+smoothNoise(x*0.25,z*0.25)*0.3+smoothNoise(x*0.5,z*0.5)*0.1;return Math.floor(h*MAX_H)+1;}
  function groundHeightAt(wx,wz){const gx=Math.round(wx),gz=Math.round(wz);if(gx<0||gz<0||gx>=WORLD||gz>=WORLD)return 0;return heightMap[gx][gz]+0.5;}

  const cubeGeo = new THREE.BoxGeometry(1,1,1);
  const matGrass = new THREE.MeshLambertMaterial({color:0x5fa832,flatShading:true});
  const matDirt  = new THREE.MeshLambertMaterial({color:0x8a5a2b,flatShading:true});
  const matStone = new THREE.MeshLambertMaterial({color:0x808080,flatShading:true});
  function buildTerrain(){
    const pos={grass:[],dirt:[],stone:[]};
    for(let x=0;x<WORLD;x++){heightMap[x]=[];for(let z=0;z<WORLD;z++){
      const h=terrainHeight(x,z);heightMap[x][z]=h;
      for(let y=h;y>h-3&&y>=0;y--){ if(y===h)pos.grass.push([x,y,z]); else if(y>h-2)pos.dirt.push([x,y,z]); else pos.stone.push([x,y,z]); }
    }}
    const d=new THREE.Object3D();
    const make=(list,mat)=>{const m=new THREE.InstancedMesh(cubeGeo,mat,list.length);
      list.forEach((p,i)=>{d.position.set(p[0],p[1],p[2]);d.updateMatrix();m.setMatrixAt(i,d.matrix);});
      m.instanceMatrix.needsUpdate=true;scene.add(m);};
    make(pos.grass,matGrass);make(pos.dirt,matDirt);make(pos.stone,matStone);
  }

  // ---- Local player prediction (server validates) ----
  const me = { x:25, y:0, z:25, yaw:0, pitch:0, vy:0, onGround:false, height:1.7 };
  const keys = {}; const SPEED=6, JUMP=8, GRAVITY=22;
  addEventListener('keydown',e=>{keys[e.code]=true; if(e.code==='KeyR') reload();});
  addEventListener('keyup',e=>{keys[e.code]=false;});
  const canvas = renderer.domElement;
  document.addEventListener('mousemove',e=>{ if(document.pointerLockElement!==canvas) return;
    me.yaw -= e.movementX*0.0022; me.pitch -= e.movementY*0.0022;
    me.pitch = Math.max(-Math.PI/2+0.05, Math.min(Math.PI/2-0.05, me.pitch)); });

  // ---- Shooting (client sends intent; recoil + ammo are local feel) ----
  const MAG=30, RELOAD=1.3; let ammo=MAG, reloading=false, recoil=0;
  canvas.addEventListener('mousedown',e=>{ if(e.button===0) shoot(); });
  function shoot(){
    if(!running || reloading || ammo<=0){ if(ammo<=0) reload(); return; }
    ammo--; recoil=0.14; updateAmmo();
    const dir=camera.getWorldDirection(new THREE.Vector3());
    socket.emit('shoot',{ x:camera.position.x,y:camera.position.y,z:camera.position.z, dx:dir.x,dy:dir.y,dz:dir.z });
  }
  function reload(){ if(!running||reloading||ammo===MAG) return; reloading=true;
    document.getElementById('ammoText').innerHTML = MAG+' / '+MAG+'<span class="reload">RELOADING…</span>';
    setTimeout(()=>{ammo=MAG;reloading=false;updateAmmo();},RELOAD*1000); }
  function updateAmmo(){ if(!reloading) document.getElementById('ammoText').textContent = ammo+' / '+MAG; }

  // ---- Tracers (fired by anyone, broadcast by server) ----
  const tracers=[];
  function spawnTracer(o,dir){ const to=new THREE.Vector3(o.x+dir.x*80,o.y+dir.y*80,o.z+dir.z*80);
    const g=new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(o.x,o.y,o.z),to]);
    const m=new THREE.LineBasicMaterial({color:0xffee44,transparent:true,opacity:1});
    const l=new THREE.Line(g,m);scene.add(l);tracers.push({mesh:l,life:0.08}); }

  // ---- Remote entities ----
  const otherPlayers={}; // id -> group
  const enemyMeshes={};  // id -> group

  function makeAvat
