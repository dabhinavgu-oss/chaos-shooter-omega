<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chaos Shooter Omega — 3D Voxel Multiplayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- HUD (hidden until playing) -->
  <div id="hud">
    <div id="crosshair"></div>
    <div id="topInfo">SCORE: <span id="score">0</span><br/>WAVE: <span id="wave">1</span><br/>PLAYERS: <span id="pcount">1</span></div>
    <div id="killfeed"></div>
    <div id="healthWrap"><div id="healthLabel">HEALTH</div><div id="healthBarBg"><div id="healthBar"></div></div></div>
    <div id="ammo"><span id="ammoText">30 / 30</span></div>
  </div>
  <div id="damageFlash"></div>
  <div id="deadOverlay">YOU DIED — RESPAWNING…</div>

  <!-- Start screen -->
  <div id="startScreen" class="screen">
    <h1>CHAOS<br/>SHOOTER<br/>OMEGA</h1>
    <p class="tagline">Co-op zombie waves. Friendly fire very much on.</p>
    <p class="controls">
      <span class="key">WASD</span> move
      <span class="key">SPACE</span> jump
      <span class="key">MOUSE</span> look
      <span class="key">CLICK</span> shoot
      <span class="key">R</span> reload
    </p>
    <div class="joinRow">
      <input id="nameInput" placeholder="Your name" maxlength="16" value="Player" />
      <input id="colorInput" type="color" value="#1e90ff" title="Your color" />
    </div>
    <button id="playBtn" class="btn">CLICK TO PLAY</button>
  </div>

  <!-- Libraries: Three.js from CDN, Socket.io served by our own server -->
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="game.js"></script>
</body>
</html>
